<!DOCTYPE html>
<html>
<body>

<h2>URL Shortener</h2>

<input type="text" id="longUrl" placeholder="Enter URL">
<button onclick="shorten()">Shorten</button>

<p id="result"></p>

<script>
let urlMap = {}; // stores short → original

function shorten() {
    let url = document.getElementById("longUrl").value;

    let shortCode = Math.floor(Math.random() * 1000);
    let shortUrl = "short.ly/" + shortCode;

    urlMap[shortCode] = url;

    document.getElementById("result").innerHTML =
        `<a href="#" onclick="redirect(${shortCode})">${shortUrl}</a>`;
}

function redirect(code) {
    let original = urlMap[code];
    window.location.href = original;
}
</script>

</body>
</html>
